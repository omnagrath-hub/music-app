<!DOCTYPE html>
<html>
<head>
  <title>Music App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #121212;
      color: white;
      padding-bottom: 140px;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    .searchBar {
      text-align: center;
      margin-top: 10px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 20px;
      border: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: #1db954;
      color: white;
      cursor: pointer;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #181818;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    /* bottom player */
    .player {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 10px;
    }

    #nowPlaying {
      margin: 5px 0;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<h1>Music App</h1>

<div class="searchBar">
  <input id="searchInput" placeholder="Search music...">
  <button onclick="search()">Search</button>
</div>

<div class="results" id="results"></div>

<!-- PLAYER -->
<div class="player">
  <div id="nowPlaying">Nothing playing</div>
  <iframe id="player" width="100%" height="90" frameborder="0"></iframe>
</div>

<script>
const API_KEY = "AIzaSyDvRPmFsVDURig-g_SXuQ7hROCLwNrYEBY";

// SEARCH MUSIC
async function search() {
  const query = document.getElementById("searchInput").value;

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query} music&type=video&maxResults=12&key=${API_KEY}`
  );

  const data = await res.json();
  display(data.items);
}

// DISPLAY RESULTS
function display(videos) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  videos.forEach(video => {
    const videoId = video.id.videoId;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${video.snippet.thumbnails.medium.url}">
      <p>${video.snippet.title}</p>
    `;

    div.onclick = () => play(videoId, video.snippet.title);

    container.appendChild(div);
  });
}

// PLAY SONG
function play(id, title) {
  document.getElementById("player").src =
    `https://www.youtube.com/embed/${id}?autoplay=1`;

  document.getElementById("nowPlaying").innerText =
    "Now Playing: " + title;
}
</script>

</body>
</html>
