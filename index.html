<!DOCTYPE html>
<html>
<head>
  <title>Music App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    .searchBar {
      text-align: center;
      margin: 15px 0;
    }

    input {
      padding: 10px;
      width: 260px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: #1db954;
      color: white;
      cursor: pointer;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #181818;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    /* FULLSCREEN OVERLAY PLAYER */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    #overlay iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }

    #closeBtn {
      position: absolute;
      top: 20px;
      right: 25px;
      font-size: 28px;
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      cursor: pointer;
      z-index: 1000;
    }

    #nowPlaying {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      font-size: 16px;
      z-index: 1000;
      max-width: 70%;
    }
  </style>
</head>

<body>

<h1>Music App 🎧</h1>

<div class="searchBar">
  <input id="searchInput" placeholder="Search music..." onkeydown="if(event.key==='Enter') search()">
  <button onclick="search()">Search</button>
</div>

<div class="results" id="results"></div>

<!-- FULLSCREEN PLAYER -->
<div id="overlay">
  <button id="closeBtn" onclick="closePlayer()">✖</button>

  <iframe 
    id="player"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
    allowfullscreen>
  </iframe>

  <p id="nowPlaying">Nothing playing</p>
</div>

<script>
const API_KEY = "AIzaSyDvRPmFsVDURig-g_SXuQ7hROCLwNrYEBY";

// SEARCH
async function search() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)} music&type=video&maxResults=12&key=${API_KEY}`
  );

  const data = await res.json();
  display(data.items || []);
}

// DISPLAY RESULTS
function display(videos) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  videos.forEach(video => {
    if (!video.id || !video.id.videoId) return;

    const videoId = video.id.videoId;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${video.snippet.thumbnails.medium.url}">
      <p>${video.snippet.title}</p>
    `;

    div.onclick = () => play(videoId, video.snippet.title);

    container.appendChild(div);
  });
}

// PLAY VIDEO (TRUE FULLSCREEN FEEL)
function play(id, title) {
  document.getElementById("overlay").style.display = "flex";

  document.getElementById("player").src =
    `https://www.youtube.com/embed/${id}?autoplay=1&controls=1&fs=1&modestbranding=1`;

  document.getElementById("nowPlaying").innerText =
    "Now Playing: " + title;
}

// CLOSE PLAYER
function closePlayer() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("player").src = "";
}

// ESC key closes player
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closePlayer();
});
</script>

</body>
</html>
